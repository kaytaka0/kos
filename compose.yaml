
services:
  edk2-build:
    build: .
    volumes:
      - type: bind
        source: ./KosLoaderPkg/
        target: /home/vscode/KosLoaderPkg
        read_only: false
      - type: bind
        source: ./kernel
        target: /home/vscode/kernel
      - type: bind
        source: ./DISK/EFI/BOOT
        target: /home/vscode/output
        read_only: false
      - type: bind
        source: ./devenv
        target: /home/vscode/devenv
    command: ["/home/vscode/build_kernel_loader.sh"]